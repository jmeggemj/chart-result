<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>상품 가격 차트 임베드</title>
    <style>
      :root {
        --bg: #fbf7ef;
        --ink: #1d2737;
        --muted: #5f697b;
        --panel: rgba(255, 255, 255, 0.84);
        --border: rgba(43, 54, 76, 0.1);
        --shadow: 0 24px 50px rgba(42, 50, 68, 0.11);
        --primary: #2358d2;
        --secondary: #ea6f2d;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "Segoe UI", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
        color: var(--ink);
        background:
          radial-gradient(circle at top left, rgba(234, 111, 45, 0.13), transparent 35%),
          radial-gradient(circle at bottom right, rgba(35, 88, 210, 0.12), transparent 34%),
          linear-gradient(180deg, #fffdfa 0%, var(--bg) 100%);
      }

      main {
        width: min(1080px, calc(100% - 24px));
        margin: 20px auto 48px;
      }

      .hero,
      .card {
        border: 1px solid var(--border);
        border-radius: 28px;
        background: var(--panel);
        box-shadow: var(--shadow);
        backdrop-filter: blur(18px);
      }

      .hero {
        padding: 28px;
      }

      .eyebrow {
        display: inline-block;
        margin-bottom: 10px;
        padding: 6px 12px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.7);
        color: var(--muted);
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.04em;
        text-transform: uppercase;
      }

      h1 {
        margin: 0;
        font-size: clamp(28px, 5vw, 48px);
        line-height: 1;
      }

      .hero p {
        margin: 14px 0 0;
        max-width: 760px;
        color: var(--muted);
        font-size: 16px;
        line-height: 1.7;
      }

      .products {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
        gap: 16px;
        margin-top: 18px;
      }

      .card {
        padding: 18px;
      }

      .card h2 {
        margin: 0;
        font-size: 22px;
      }

      .meta {
        margin-top: 12px;
        color: var(--muted);
        font-size: 14px;
        line-height: 1.6;
      }

      .price-line {
        margin-top: 16px;
        font-size: 15px;
      }

      .price-line strong {
        display: block;
        margin-top: 2px;
        color: var(--ink);
        font-size: 24px;
      }

      .price-line.membership strong {
        color: var(--secondary);
      }

      .price-hint {
        display: block;
        margin-top: 6px;
        color: var(--muted);
        font-size: 13px;
      }

      .actions {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        margin-top: 18px;
      }

      .button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 42px;
        padding: 0 14px;
        border-radius: 999px;
        color: white;
        background: var(--primary);
        text-decoration: none;
        font-weight: 700;
      }

      .button.secondary {
        color: var(--ink);
        background: rgba(35, 88, 210, 0.08);
      }

      pre {
        overflow: auto;
        margin: 16px 0 0;
        padding: 14px;
        border-radius: 18px;
        background: rgba(29, 39, 55, 0.94);
        color: #f4f0e8;
        font-size: 13px;
        line-height: 1.5;
      }

      .modal {
        position: fixed;
        inset: 0;
        z-index: 1000;
      }

      .modal.hidden {
        display: none;
      }

      .modal-overlay {
        position: absolute;
        inset: 0;
        background: rgba(20, 27, 39, 0.5);
        backdrop-filter: blur(4px);
      }

      .modal-dialog {
        position: relative;
        z-index: 1;
        width: min(1240px, calc(100vw - 40px));
        margin: min(40px, 4vw) auto;
        padding: 18px;
        border: 1px solid rgba(43, 54, 76, 0.12);
        border-radius: 28px;
        background: rgba(255, 255, 255, 0.96);
        box-shadow: 0 32px 70px rgba(18, 25, 36, 0.22);
      }

      .modal[data-preview-mode="mobile"] .modal-dialog {
        width: min(calc(var(--mobile-preview-width, 393px) + 36px), calc(100vw - 16px));
      }

      .modal-toolbar {
        display: none;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 12px;
      }

      .modal[data-preview-mode="mobile"] .modal-toolbar {
        display: flex;
      }

      .modal-toolbar-title {
        color: var(--muted);
        font-size: 13px;
        font-weight: 700;
      }

      .modal-size-toggle {
        display: inline-flex;
        gap: 6px;
        padding: 4px;
        border-radius: 999px;
        background: rgba(35, 88, 210, 0.08);
      }

      .size-button {
        min-height: 34px;
        padding: 0 12px;
        border: 0;
        border-radius: 999px;
        color: var(--ink);
        background: transparent;
        font: inherit;
        font-size: 13px;
        font-weight: 700;
        cursor: pointer;
      }

      .size-button.is-active {
        color: white;
        background: var(--primary);
      }

      .modal-frame {
        width: 100%;
      }

      .modal-frame iframe {
        display: block;
        width: 100%;
        height: 340px;
        border: 0;
        border-radius: 18px;
        background: white;
      }

      body.modal-open {
        overflow: hidden;
      }

      .status {
        margin-top: 18px;
        padding: 22px;
        border-radius: 24px;
        border: 1px dashed rgba(43, 54, 76, 0.2);
        color: var(--muted);
      }

      @media (max-width: 640px) {
        main {
          width: min(calc(100% - 16px), 1080px);
          margin-top: 8px;
        }

        .hero,
        .card {
          border-radius: 22px;
        }

        .hero {
          padding: 20px;
        }

        .modal-dialog {
          width: calc(100vw - 16px);
          margin: 8px auto;
          padding: 8px;
          border-radius: 22px;
        }

        .modal[data-preview-mode="mobile"] .modal-dialog {
          width: min(calc(var(--mobile-preview-width, 393px) + 16px), calc(100vw - 16px));
        }

        .modal-toolbar {
          margin-bottom: 8px;
        }

        .modal-toolbar-title {
          font-size: 12px;
        }

        .size-button {
          min-height: 32px;
          padding: 0 10px;
          font-size: 12px;
        }

        .modal-frame iframe {
          height: 340px;
          min-height: 340px;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <section class="hero">
        <div class="eyebrow">Static Embed</div>
        <h1>블로그용 상품 가격 차트</h1>
        <p>
          `data/prices.tsv`를 수정한 뒤 `python3 scripts/build_price_data.py`를 실행하면
          상품별 JSON이 생성됩니다. 아래 카드는 현재 샘플 데이터 기준이며, 각 상품은
          `embed.html?vendor_item_id=<vendor_item_id>` 형태로 임베드할 수 있습니다. 멤버십가가 비어
          있는 행은 빌드 단계에서 일반가로 자동 대체됩니다.
        </p>
      </section>

      <section class="status" id="status">상품 목록을 불러오는 중입니다.</section>
      <section class="products" id="products"></section>
    </main>

    <section class="modal hidden" id="preview-modal" aria-hidden="true">
      <div class="modal-overlay" id="preview-modal-overlay"></div>
      <div class="modal-dialog" role="dialog" aria-modal="true" aria-label="iframe 미리보기">
        <div class="modal-toolbar" id="preview-modal-toolbar">
          <div class="modal-toolbar-title">모바일 미리보기 폭</div>
          <div class="modal-size-toggle" role="group" aria-label="모바일 미리보기 폭 선택">
            <button class="size-button is-active" type="button" data-size-button data-preview-size="393">소형 393</button>
            <button class="size-button" type="button" data-size-button data-preview-size="430">대형 430</button>
          </div>
        </div>
        <div class="modal-frame" id="preview-modal-frame"></div>
      </div>
    </section>

    <script>
      const currencyFormatter = new Intl.NumberFormat("ko-KR", {
        style: "currency",
        currency: "KRW",
        maximumFractionDigits: 0,
      });
      const dateFormatter = new Intl.DateTimeFormat("ko-KR", {
        dateStyle: "medium",
        timeStyle: "short",
        timeZone: "Asia/Seoul",
      });

      function formatCurrency(value) {
        return currencyFormatter.format(value);
      }

      function escapeHtml(value) {
        return String(value).replace(/[&<>"']/g, (char) => {
          const map = {
            "&": "&amp;",
            "<": "&lt;",
            ">": "&gt;",
            '"': "&quot;",
            "'": "&#39;",
          };
          return map[char];
        });
      }

      function buildEmbedCode(vendorItemId) {
        const encodedId = encodeURIComponent(vendorItemId);
        const absoluteUrl = new URL(
          `./embed.html?vendor_item_id=${encodedId}`,
          window.location.href
        ).href;
        return `<iframe\n  src="${absoluteUrl}"\n  width="100%"\n  height="340"\n  style="border:0;"\n  loading="lazy"\n></iframe>`;
      }

      function buildPreviewSrc(vendorItemId) {
        return `./embed.html?vendor_item_id=${encodeURIComponent(vendorItemId)}`;
      }

      function setupPreviewModal() {
        const modalEl = document.getElementById("preview-modal");
        const overlayEl = document.getElementById("preview-modal-overlay");
        const dialogEl = modalEl.querySelector(".modal-dialog");
        const frameEl = document.getElementById("preview-modal-frame");
        const sizeButtons = Array.from(modalEl.querySelectorAll("[data-size-button]"));
        let iframe = null;
        let currentMode = "desktop";
        let currentMobileSize = "393";

        function applyMobileSize(size) {
          currentMobileSize = size;
          modalEl.style.setProperty("--mobile-preview-width", `${size}px`);
          sizeButtons.forEach((button) => {
            button.classList.toggle("is-active", button.dataset.previewSize === size);
          });
        }

        function setPreviewMode(mode) {
          currentMode = mode;
          modalEl.dataset.previewMode = mode;
        }

        function closeModal() {
          modalEl.classList.add("hidden");
          modalEl.setAttribute("aria-hidden", "true");
          document.body.classList.remove("modal-open");
        }

        function openModal(vendorItemId, productName, mode = "desktop") {
          if (!iframe) {
            iframe = document.createElement("iframe");
            iframe.width = "100%";
            iframe.height = "340";
            iframe.style.border = "0";
            iframe.loading = "lazy";
            frameEl.appendChild(iframe);
          }

          const nextSrc = buildPreviewSrc(vendorItemId);
          if (iframe.src !== new URL(nextSrc, window.location.href).href) {
            iframe.src = nextSrc;
          }
          iframe.title = `${productName} iframe 미리보기`;

          setPreviewMode(mode);
          if (mode === "mobile") {
            applyMobileSize(currentMobileSize);
          }

          modalEl.classList.remove("hidden");
          modalEl.setAttribute("aria-hidden", "false");
          document.body.classList.add("modal-open");
        }

        applyMobileSize(currentMobileSize);
        overlayEl.addEventListener("click", closeModal);
        dialogEl.addEventListener("click", (event) => {
          event.stopPropagation();
        });
        document.addEventListener("keydown", (event) => {
          if (event.key === "Escape" && !modalEl.classList.contains("hidden")) {
            closeModal();
          }
        });
        sizeButtons.forEach((button) => {
          button.addEventListener("click", () => {
            if (currentMode !== "mobile") {
              return;
            }
            applyMobileSize(button.dataset.previewSize || "393");
          });
        });

        return { openModal, closeModal };
      }

      async function init() {
        const statusEl = document.getElementById("status");
        const productsEl = document.getElementById("products");
        const { openModal } = setupPreviewModal();

        try {
          const response = await fetch("./data/products.json", { cache: "no-store" });
          if (!response.ok) {
            throw new Error(`HTTP ${response.status}`);
          }

          const payload = await response.json();
          const products = Array.isArray(payload.products) ? payload.products : [];

          if (products.length === 0) {
            statusEl.textContent =
              "아직 생성된 상품 데이터가 없습니다. TSV를 채운 뒤 빌드 스크립트를 실행하세요.";
            return;
          }

          statusEl.remove();

          products.forEach((product) => {
            const card = document.createElement("article");
            card.className = "card";
            const vendorItemId = product.vendor_item_id;

            const membershipHint =
              product.latestMembership === product.latestRegular
                ? '<span class="price-hint">현재 일반가와 동일</span>'
                : '<span class="price-hint">멤버십 적용 가격</span>';
            const membershipBlock = `<div class="price-line membership">현재 멤버십가<strong>${formatCurrency(product.latestMembership)}</strong>${membershipHint}</div>`;

            card.innerHTML = `
              <h2>${escapeHtml(product.name)}</h2>
              <div class="meta">
                vendor_item_id: <strong>${escapeHtml(vendorItemId)}</strong><br />
                마지막 수집: ${dateFormatter.format(new Date(product.latestAt))}
              </div>
              <div class="price-line">현재 일반가<strong>${formatCurrency(product.latestRegular)}</strong></div>
              ${membershipBlock}
              <div class="actions">
                <a class="button" href="./embed.html?vendor_item_id=${encodeURIComponent(vendorItemId)}">차트 보기</a>
                <button class="button secondary" type="button" data-copy-button>iframe 코드 복사</button>
                <button class="button secondary" type="button" data-preview-button>미리보기 열기</button>
                <button class="button secondary" type="button" data-mobile-preview-button>모바일 미리보기</button>
              </div>
              <pre>${escapeHtml(buildEmbedCode(vendorItemId))}</pre>
            `;

            const copyButton = card.querySelector("[data-copy-button]");
            const previewButton = card.querySelector("[data-preview-button]");
            const mobilePreviewButton = card.querySelector("[data-mobile-preview-button]");
            const snippet = buildEmbedCode(vendorItemId);
            copyButton.addEventListener("click", async () => {
              try {
                await navigator.clipboard.writeText(snippet);
                copyButton.textContent = "복사됨";
                window.setTimeout(() => {
                  copyButton.textContent = "iframe 코드 복사";
                }, 1200);
              } catch (_error) {
                copyButton.textContent = "복사 실패";
              }
            });

            previewButton.addEventListener("click", () => {
              openModal(vendorItemId, product.name, "desktop");
            });

            mobilePreviewButton.addEventListener("click", () => {
              openModal(vendorItemId, product.name, "mobile");
            });

            productsEl.appendChild(card);
          });
        } catch (error) {
          statusEl.textContent =
            error instanceof Error
              ? `상품 목록을 불러오지 못했습니다: ${error.message}`
              : "상품 목록을 불러오지 못했습니다.";
        }
      }

      init();
    </script>
  </body>
</html>
